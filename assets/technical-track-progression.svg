<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Technical Track Progression Overview</title>
  <desc id="desc">A summary visualization showing how the center of gravity shifts across the Technical track and how emphasis changes by dimension from P1 through P7.</desc>
  <style>
    text {
      font-family: "Segoe UI", Arial, sans-serif;
      fill: #0f172a;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
    }
    .subtitle {
      font-size: 15px;
      fill: #475569;
    }
    .section {
      font-size: 18px;
      font-weight: 700;
    }
    .label {
      font-size: 14px;
      fill: #334155;
    }
    .small {
      font-size: 12px;
      fill: #64748b;
    }
    .axis {
      stroke: #cbd5e1;
      stroke-width: 8;
      stroke-linecap: round;
    }
    .marker {
      fill: #2563eb;
      stroke: #ffffff;
      stroke-width: 2;
    }
    .panel {
      fill: #f8fafc;
      stroke: #e2e8f0;
      stroke-width: 1;
      rx: 16;
    }
    .matrix-stroke {
      stroke: #ffffff;
      stroke-width: 2;
    }
  </style>

  <rect x="20" y="20" width="1160" height="720" rx="20" fill="#ffffff" stroke="#e2e8f0" />

  <text class="title" x="50" y="65">Technical Track Progression Overview</text>
  <text class="subtitle" x="50" y="92">The shift band shows where each level sits between two ends of the track. The matrix shows relative emphasis, not a numeric score from the guide.</text>

  <rect class="panel" x="40" y="120" width="1120" height="250" />
  <text class="section" x="60" y="155">Shift In Center Of Gravity</text>

  <text class="label" x="60" y="210">Execution</text>
  <text class="label" x="1025" y="210">Deep Expertise</text>
  <line class="axis" x1="230" y1="205" x2="980" y2="205" />
  <circle class="marker" cx="270" cy="205" r="14" />
  <circle class="marker" cx="360" cy="205" r="14" />
  <circle class="marker" cx="470" cy="205" r="14" />
  <circle class="marker" cx="610" cy="205" r="14" />
  <circle class="marker" cx="740" cy="205" r="14" />
  <circle class="marker" cx="870" cy="205" r="14" />
  <circle class="marker" cx="950" cy="205" r="14" />
  <text class="small" x="258" y="237">P1</text>
  <text class="small" x="348" y="237">P2</text>
  <text class="small" x="458" y="237">P3</text>
  <text class="small" x="598" y="237">P4</text>
  <text class="small" x="728" y="237">P5</text>
  <text class="small" x="858" y="237">P6</text>
  <text class="small" x="938" y="237">P7</text>

  <text class="label" x="60" y="285">Local Delivery</text>
  <text class="label" x="1005" y="285">Company Impact</text>
  <line class="axis" x1="230" y1="280" x2="980" y2="280" />
  <circle class="marker" cx="255" cy="280" r="14" />
  <circle class="marker" cx="330" cy="280" r="14" />
  <circle class="marker" cx="430" cy="280" r="14" />
  <circle class="marker" cx="570" cy="280" r="14" />
  <circle class="marker" cx="720" cy="280" r="14" />
  <circle class="marker" cx="860" cy="280" r="14" />
  <circle class="marker" cx="955" cy="280" r="14" />
  <text class="small" x="243" y="312">P1</text>
  <text class="small" x="318" y="312">P2</text>
  <text class="small" x="418" y="312">P3</text>
  <text class="small" x="558" y="312">P4</text>
  <text class="small" x="708" y="312">P5</text>
  <text class="small" x="848" y="312">P6</text>
  <text class="small" x="943" y="312">P7</text>

  <text class="label" x="60" y="360">Known Problems</text>
  <text class="label" x="982" y="360">Technical Direction</text>
  <line class="axis" x1="230" y1="355" x2="980" y2="355" />
  <circle class="marker" cx="250" cy="355" r="14" />
  <circle class="marker" cx="345" cy="355" r="14" />
  <circle class="marker" cx="440" cy="355" r="14" />
  <circle class="marker" cx="585" cy="355" r="14" />
  <circle class="marker" cx="735" cy="355" r="14" />
  <circle class="marker" cx="875" cy="355" r="14" />
  <circle class="marker" cx="960" cy="355" r="14" />
  <text class="small" x="238" y="387">P1</text>
  <text class="small" x="333" y="387">P2</text>
  <text class="small" x="428" y="387">P3</text>
  <text class="small" x="573" y="387">P4</text>
  <text class="small" x="723" y="387">P5</text>
  <text class="small" x="863" y="387">P6</text>
  <text class="small" x="948" y="387">P7</text>

  <rect class="panel" x="40" y="395" width="1120" height="325" />
  <text class="section" x="60" y="430">Relative Emphasis By Level</text>

  <text class="small" x="880" y="430">Foundational</text>
  <rect x="960" y="417" width="24" height="18" fill="#e0ecff" stroke="#ffffff" />
  <rect x="988" y="417" width="24" height="18" fill="#bfd4ff" stroke="#ffffff" />
  <rect x="1016" y="417" width="24" height="18" fill="#8fb4ff" stroke="#ffffff" />
  <rect x="1044" y="417" width="24" height="18" fill="#4f84f5" stroke="#ffffff" />
  <rect x="1072" y="417" width="24" height="18" fill="#1d4ed8" stroke="#ffffff" />
  <text class="small" x="1103" y="430">Defining</text>

  <text class="label" x="330" y="475">P1</text>
  <text class="label" x="410" y="475">P2</text>
  <text class="label" x="490" y="475">P3</text>
  <text class="label" x="570" y="475">P4</text>
  <text class="label" x="650" y="475">P5</text>
  <text class="label" x="730" y="475">P6</text>
  <text class="label" x="810" y="475">P7</text>

  <text class="label" x="60" y="520">Knowledge &amp; Application</text>
  <text class="label" x="60" y="570">Leadership &amp; Influence</text>
  <text class="label" x="60" y="620">Impact &amp; Accountability</text>
  <text class="label" x="60" y="670">Problem Solving &amp; Judgement</text>
  <text class="label" x="60" y="720">Collaboration &amp; Interaction</text>

  <!-- KA -->
  <rect class="matrix-stroke" x="320" y="500" width="64" height="32" fill="#e0ecff" />
  <rect class="matrix-stroke" x="400" y="500" width="64" height="32" fill="#bfd4ff" />
  <rect class="matrix-stroke" x="480" y="500" width="64" height="32" fill="#8fb4ff" />
  <rect class="matrix-stroke" x="560" y="500" width="64" height="32" fill="#4f84f5" />
  <rect class="matrix-stroke" x="640" y="500" width="64" height="32" fill="#4f84f5" />
  <rect class="matrix-stroke" x="720" y="500" width="64" height="32" fill="#1d4ed8" />
  <rect class="matrix-stroke" x="800" y="500" width="64" height="32" fill="#1d4ed8" />

  <!-- LI -->
  <rect class="matrix-stroke" x="320" y="550" width="64" height="32" fill="#e0ecff" />
  <rect class="matrix-stroke" x="400" y="550" width="64" height="32" fill="#bfd4ff" />
  <rect class="matrix-stroke" x="480" y="550" width="64" height="32" fill="#bfd4ff" />
  <rect class="matrix-stroke" x="560" y="550" width="64" height="32" fill="#8fb4ff" />
  <rect class="matrix-stroke" x="640" y="550" width="64" height="32" fill="#4f84f5" />
  <rect class="matrix-stroke" x="720" y="550" width="64" height="32" fill="#1d4ed8" />
  <rect class="matrix-stroke" x="800" y="550" width="64" height="32" fill="#1d4ed8" />

  <!-- IA -->
  <rect class="matrix-stroke" x="320" y="600" width="64" height="32" fill="#e0ecff" />
  <rect class="matrix-stroke" x="400" y="600" width="64" height="32" fill="#bfd4ff" />
  <rect class="matrix-stroke" x="480" y="600" width="64" height="32" fill="#bfd4ff" />
  <rect class="matrix-stroke" x="560" y="600" width="64" height="32" fill="#8fb4ff" />
  <rect class="matrix-stroke" x="640" y="600" width="64" height="32" fill="#4f84f5" />
  <rect class="matrix-stroke" x="720" y="600" width="64" height="32" fill="#1d4ed8" />
  <rect class="matrix-stroke" x="800" y="600" width="64" height="32" fill="#1d4ed8" />

  <!-- PS -->
  <rect class="matrix-stroke" x="320" y="650" width="64" height="32" fill="#e0ecff" />
  <rect class="matrix-stroke" x="400" y="650" width="64" height="32" fill="#bfd4ff" />
  <rect class="matrix-stroke" x="480" y="650" width="64" height="32" fill="#8fb4ff" />
  <rect class="matrix-stroke" x="560" y="650" width="64" height="32" fill="#4f84f5" />
  <rect class="matrix-stroke" x="640" y="650" width="64" height="32" fill="#4f84f5" />
  <rect class="matrix-stroke" x="720" y="650" width="64" height="32" fill="#1d4ed8" />
  <rect class="matrix-stroke" x="800" y="650" width="64" height="32" fill="#1d4ed8" />

  <!-- CI -->
  <rect class="matrix-stroke" x="320" y="700" width="64" height="32" fill="#e0ecff" />
  <rect class="matrix-stroke" x="400" y="700" width="64" height="32" fill="#bfd4ff" />
  <rect class="matrix-stroke" x="480" y="700" width="64" height="32" fill="#8fb4ff" />
  <rect class="matrix-stroke" x="560" y="700" width="64" height="32" fill="#8fb4ff" />
  <rect class="matrix-stroke" x="640" y="700" width="64" height="32" fill="#4f84f5" />
  <rect class="matrix-stroke" x="720" y="700" width="64" height="32" fill="#4f84f5" />
  <rect class="matrix-stroke" x="800" y="700" width="64" height="32" fill="#1d4ed8" />
</svg>
